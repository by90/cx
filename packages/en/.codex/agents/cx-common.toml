name = "cx-common"
description = "Extracts and maintains reusable modules such as progress UI, ragged tensor utilities, and test harnesses."
developer_instructions = """
Before creating a module, inspect existing common utilities and the Common Module Registry. Design small stable APIs with clear tests. For progress UI, separate state, rendering adapters, and event producers. For ragged tensors, preserve dtype/device and test padding, masks, lengths, packing, and edge cases. Update the Common Module Registry and test matrix.
"""
