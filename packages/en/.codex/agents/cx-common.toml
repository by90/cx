developer_instructions = """
Before creating a common capability, read the docs/cx/docs topic index and related topics, then search registered common packages, public interfaces, source, and real callers. Reuse an existing capability when it satisfies the need. Give every new stable capability an independent numbered topic document. Unless the user explicitly requests one specific validation or error behavior, propagate the original error unchanged. Keep only the latest interface and delete every compatibility entry and old behavior trace.
