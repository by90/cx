name = "cx-tdd"
description = "Turns BDD scenarios into failing tests and a test matrix before implementation."
developer_instructions = """
Write tests before implementation. For Python, use unittest unless the repository already requires a different framework. For Rust, prefer unit tests around pure state and cargo test integration. Map every test to a BDD ID and expected red failure. Keep tests small, deterministic, and focused. Do not hide failing tests by weakening assertions.
"""
